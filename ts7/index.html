<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Task Board — TS7 Preview</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f5f5f5;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 16px;
    }
    h1 { color: #2c3e50; margin-top: 0; }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 0.85em;
      font-weight: 600;
    }
    .badge-go { background: #00add8; color: white; }
    .badge-ts { background: #3178c6; color: white; }
    #app { min-height: 200px; }
    .task-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }
    .task-item:last-child { border-bottom: none; }
    button {
      background: #3498db;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9em;
    }
    button:hover { background: #2980b9; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Weekly Task Board <span class="badge badge-go">TS 7.0</span></h1>
    <p>TypeScript 7.0 Beta (Go-based) + Vite が正常に動作しています。</p>
    <p><span class="badge badge-ts">tsgo</span> で型チェック中...</p>
  </div>

  <div id="app" class="card">
    <!-- TS module renders here -->
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
